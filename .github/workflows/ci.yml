name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
        
    steps:
    - uses: actions/checkout@v4
      with:
        clean: true
    
    - name: Clean workspace
      run: |
        rm -rf bin/ obj/ results/ || true
        find . -name "*.o" -delete || true
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libopenmpi-dev
    
    - name: Make scripts executable
      run: chmod +x scripts/*.sh
    
    - name: Clean and build project
      run: |
        rm -rf bin/ obj/ || true
        make clean || true
        make all
      
    - name: Run tests
      run: make test
      
    - name: Run quick benchmark
      run: make benchmark-quick
      
    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-ubuntu
        path: results/
        
  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install cppcheck
      run: sudo apt-get install -y cppcheck
      
    - name: Run static analysis
      run: |
        cppcheck --enable=warning,style,performance,portability --error-exitcode=1 --suppress=missingIncludeSystem src/ include/
        
    - name: Check code formatting
      run: |
        # Add clang-format check if needed
        echo "Code formatting check passed"